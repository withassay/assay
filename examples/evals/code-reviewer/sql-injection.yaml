- id: sql-injection-01
  input: |
    def get_user(user_id):
        query = f"SELECT * FROM users WHERE id = {user_id}"
        return db.execute(query)
  expected:
    must_contain:
      - SQL injection
    must_not_contain:
      - safe
      - secure
  grading:
    - type: deterministic
      check: contains
      values:
        - SQL injection
        - parameterized
    - type: llm-judge
      rubric: |
        Does the review correctly identify the f-string SQL injection vulnerability
        and recommend parameterized queries as the fix?
  tags:
    - security
    - injection
  difficulty: easy
